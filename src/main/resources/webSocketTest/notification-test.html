<!DOCTYPE html>
<html>
<head>
  <title>WebSocket 알림 테스트</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>WebSocket 알림 테스트 페이지</h2>
<p>이 페이지는 Spring WebSocket 알림을 테스트하는 용도입니다.</p>
<button onclick="connect()">🔌 WebSocket 연결</button>
<button onclick="disconnect()">❌ WebSocket 연결 해제</button>
<button onclick="send()">📨 알림 전송</button>

<script>
  let stompClient = null;
  let isSubscribed = false;

  // 🟡 여기에 실제 JWT 토큰을 붙여넣으세요
  const jwt = "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJoaGhjMDIxM0BuYXZlci5jb20iLCJyb2xlIjoiUk9MRV9VU0VSIiwidXNlcklkIjo0LCJpYXQiOjE3NDc5MzQ4MDEsImV4cCI6MTc0Nzk3ODAwMX0.Q3BIPn3zgGbSaAJZLa1q0PHQPtc9XvgJACSnQam12UM";

  // 🟡 테스트할 유저 ID
  const userId = 4;

  function connect() {
    if (stompClient && stompClient.connected) {
      console.log("🔁 이미 WebSocket에 연결되어 있습니다.");
      return;
    }

    const socket = new SockJS("http://localhost:8080/ws?token=" + jwt);
    stompClient = Stomp.over(socket);

    stompClient.connect({}, function (frame) {
      console.log("✅ WebSocket 연결됨:", frame);

      if (!isSubscribed) {
        stompClient.subscribe("/topic/user/" + userId, function (message) {
          const data = JSON.parse(message.body);
          alert("🔔 수신된 알림: " + data.content);
        });
        isSubscribed = true;
      }
    }, function (error) {
      console.error("❌ WebSocket 연결 실패:", error);
    });
  }

  function disconnect() {
    if (stompClient && stompClient.connected) {
      stompClient.disconnect(() => {
        console.log("🔌 WebSocket 연결 해제됨");
      });
      isSubscribed = false;
    } else {
      console.log("⚠️ 연결된 WebSocket이 없습니다.");
    }
  }

  function send() {
    if (!stompClient || !stompClient.connected) {
      alert("⚠️ 먼저 WebSocket에 연결해주세요.");
      return;
    }

    stompClient.send("/app/notify", {}, JSON.stringify({
      notificationType: "STUDY_JOIN_REQUEST",
      content: "테스트 알림입니다!",
      url: "/study/123"
    }));
  }
</script>
</body>
</html>
